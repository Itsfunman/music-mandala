services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - ws-server

  ws-server:
    build:
      context: .
      dockerfile: Dockerfile.ws
    command: node backend/websocket-server.js
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
