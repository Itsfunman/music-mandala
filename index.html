<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Mandala</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>

<body>
  <div id="mandala-container">
    <svg id="canvas" width="400" height="400" viewBox="0 0 400 400">
    </svg>
  </div>
  <div class="instruments" id="instruments">
    <!-- Instruments will be added here by JS -->
  </div>
  <div class="loop-editor" id="editor-loop"></div>
  </div>

  <div class="controls">
    <button id="play">Play</button>
    <button id="stop">Stop</button>
    <button id="save">Save Mandala</button>
    <div class="bpm-control">
      <label>BPM:</label>
      <span id="bpm-value" class="bpm-value">120</span>
      <input type="range" id="bpm" min="60" max="180" value="120">
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
